<!DOCTYPE html>
<html>
<head>
    <title>Domnick Rono | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* HERO */
        header {
            text-align: center;
            padding: 60px 20px;
        }

        .profile {
            width: 140px;
            border-radius: 50%;
            border: 4px solid #38bdf8;
        }

        h1 {
            margin: 10px 0;
        }

        /* BUTTONS */
        .btn {
            background: #38bdf8;
            color: black;
            padding: 10px 15px;
            border-radius: 20px;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* SECTIONS */
        section {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.06);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        /* PROJECTS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 15px;
        }

        /* XP BAR */
        .xp-bar {
            background: #1e293b;
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        #xp-fill {
            height: 10px;
            width: 0%;
            background: #38bdf8;
        }

        /* CHAT */
        #chatBox {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 260px;
            background: #111827;
            border: 1px solid #38bdf8;
            border-radius: 10px;
            display: none;
        }

        #chatLog {
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-size: 13px;
        }

        #chatInput {
            width: 100%;
            padding: 10px;
            border: none;
            outline: none;
        }

        #chatBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }

        /* BADGES */
        .badge {
            display: inline-block;
            padding: 6px 10px;
            margin: 5px;
            border-radius: 20px;
            background: rgba(56,189,248,0.2);
            border: 1px solid #38bdf8;
            font-size: 12px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
    </style>
</head>

<body>

<!-- HERO -->
<header>
    <img src="b8a75f786dd7e5b40962e09b4ef508e8.png" class="profile">

    <h1 id="typing"></h1>
    <p>Student • Athlete • Developer</p>

    <a class="btn" href="https://github.com/RONO-DOMINICK">GitHub</a>
    <a class="btn" href="https://linkedin.com">LinkedIn</a>

    <h3>Level <span id="level">1</span></h3>
    <div class="xp-bar"><div id="xp-fill"></div></div>
</header>

<!-- ABOUT -->
<section>
    <div class="card">
        <h2>About Me</h2>
        <p>
            I am Domnick Rono, a student at Kenyatta University.
            I am passionate about athletics, swimming, taekwondo,
            football, fitness, and technology.
        </p>
    </div>
</section>

<!-- PROJECTS -->
<section>
    <div class="card">
        <h2>Projects</h2>
        <div class="grid" id="projects">Loading...</div>
    </div>
</section>

<!-- ACHIEVEMENTS -->
<section>
    <div class="card">
        <h2>Achievements</h2>
        <div id="badges"></div>
    </div>
</section>

<!-- CHAT -->
<div id="chatBtn">
    <button class="btn" onclick="toggleChat()">🤖 AI Chat</button>
</div>

<div id="chatBox">
    <div id="chatLog"></div>
    <input id="chatInput" placeholder="Ask me..." onkeydown="chat(event)">
</div>

<footer>
    © 2026 Domnick Rono
</footer>

<script>

/* XP SYSTEM */
let xp = Number(localStorage.getItem("xp")) || 0;
let level = Number(localStorage.getItem("level")) || 1;

xp += 20;

if (xp >= 100) {
    level++;
    xp = 0;
}

localStorage.setItem("xp", xp);
localStorage.setItem("level", level);

document.getElementById("level").innerText = level;
document.getElementById("xp-fill").style.width = xp + "%";

/* TYPEWRITER */
const text = "Hi, I'm Domnick Rono 👋";
let i = 0;

function type(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i++);
        setTimeout(type,60);
    }
}
type();

/* GITHUB */
fetch("https://api.github.com/users/RONO-DOMINICK/repos")
.then(res => res.json())
.then(data => {
    document.getElementById("projects").innerHTML =
    data.slice(0,6).map(repo => `
        <div class="card">
            <h3>${repo.name}</h3>
            <p>${repo.description || "No description"}</p>
            <a class="btn" href="${repo.html_url}" target="_blank">View</a>
        </div>
    `).join("");
});

/* BADGES */
function loadBadges(){
    let visits = Number(localStorage.getItem("visits")) || 0;
    visits++;
    localStorage.setItem("visits", visits);

    let badges = ["🥉 Starter"];

    if(visits > 5) badges.push("🔥 Active");
    if(visits > 10) badges.push("🏆 Loyal");
    if(level > 2) badges.push("⚡ Skilled");
    if(level > 3) badges.push("👑 Advanced");

    document.getElementById("badges").innerHTML =
    badges.map(b => `<span class="badge">${b}</span>`).join("");
}
loadBadges();

/* CHAT */
function toggleChat(){
    let box = document.getElementById("chatBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function chat(e){
    if(e.key === "Enter"){
        let msg = e.target.value.toLowerCase();
        let reply = "";

        if(msg.includes("hello")) reply = "Hey 😄 welcome!";
        else if(msg.includes("xp")) reply = `You are level ${level} 🚀`;
        else if(msg.includes("school")) reply = "Barekeiyat → Kaplong Boys → Kenyatta University 📚";
        else if(msg.includes("github")) reply = "Check my projects above 💻";
        else reply = "Keep building 💪";

        document.getElementById("chatLog").innerHTML +=
        `<div><b>You:</b> ${msg}</div><div><b>AI:</b> ${reply}</div><hr>`;

        e.target.value = "";
    }
}

</script>

</body>
</html>
