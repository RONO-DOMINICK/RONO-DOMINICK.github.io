<!DOCTYPE html>
<html>
<head>
    <title>Domnick Rono | Infinite Mode</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
        }

        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .card {
            background: rgba(255,255,255,0.06);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 900px;
            backdrop-filter: blur(10px);
        }

        .profile {
            width: 140px;
            border-radius: 50%;
            border: 4px solid #38bdf8;
        }

        h1 { font-size: 2.5em; }

        .btn {
            background: #38bdf8;
            color: black;
            padding: 10px 15px;
            border-radius: 20px;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 15px;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }

        /* CHAT */
        #chat {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 250px;
            background: #111827;
            border: 1px solid #38bdf8;
            border-radius: 10px;
            display: none;
        }

        #log {
            height: 140px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
        }

        #chat input {
            width: 100%;
            padding: 8px;
            border: none;
            outline: none;
        }

        .ai-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }

        /* BADGES */
        .badge {
            display: inline-block;
            padding: 6px 10px;
            margin: 5px;
            border-radius: 20px;
            background: rgba(56,189,248,0.2);
            border: 1px solid #38bdf8;
            font-size: 12px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #38bdf8;
            color: black;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* XP BAR */
        .bar {
            background: #1e293b;
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 10px;
            background: #38bdf8;
            width: 0%;
        }
    </style>
</head>

<body>

<section>
    <div class="card">
        <center>
            <img src="b8a75f786dd7e5b40962e09b4ef508e8.png" class="profile">

            <h1 id="typing"></h1>
            <p>Student • Athlete • Developer</p>

            <a class="btn" href="https://github.com/RONO-DOMINICK">GitHub</a>
            <button class="btn" onclick="toggleChat()">🤖 AI Chat</button>

            <h3>🔥 Level: <span id="level">1</span></h3>
            <div class="bar"><div class="fill" id="xpbar"></div></div>
        </center>
    </div>
</section>

<section>
    <div class="card">
        <h2>💻 Projects</h2>
        <div class="grid" id="repos">Loading...</div>
    </div>
</section>

<section>
    <div class="card">
        <h2>🏆 Badges</h2>
        <div id="badges"></div>
    </div>
</section>

<footer style="text-align:center;padding:20px;">
    © 2026 Domnick Rono
</footer>

<!-- CHAT -->
<div class="ai-btn">
    <button class="btn" onclick="toggleChat()">AI</button>
</div>

<div id="chat">
    <div id="log"></div>
    <input placeholder="Ask me..." onkeydown="chat(event)">
</div>

<script>

/* XP SYSTEM */
let xp = Number(localStorage.getItem("xp")) || 0;
let level = Number(localStorage.getItem("level")) || 1;

xp += 20;

if (xp >= 100) {
    level++;
    xp = 0;
    toast("🎉 Level Up!");
}

localStorage.setItem("xp", xp);
localStorage.setItem("level", level);

/* UPDATE UI */
document.getElementById("level").innerText = level;
document.getElementById("xpbar").style.width = xp + "%";

/* TYPEWRITER */
const text = "Hi, I'm Domnick Rono 👋";
let i = 0;

function type(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i++);
        setTimeout(type,60);
    }
}
type();

/* GITHUB */
fetch("https://api.github.com/users/RONO-DOMINICK/repos")
.then(r=>r.json())
.then(data=>{
    document.getElementById("repos").innerHTML =
    data.slice(0,6).map(r=>`
        <div class="box">
            <h4>${r.name}</h4>
            <p>${r.description || "No description"}</p>
            <a class="btn" href="${r.html_url}" target="_blank">View</a>
        </div>
    `).join("");
});

/* BADGES */
function loadBadges(){
    let visits = Number(localStorage.getItem("visits")) || 0;
    visits++;
    localStorage.setItem("visits", visits);

    let badges = ["🥉 Starter"];

    if(visits >= 5) badges.push("🔥 Active Visitor");
    if(visits >= 10) badges.push("🏆 Loyal User");
    if(level >= 2) badges.push("⚡ Level Up Player");

    document.getElementById("badges").innerHTML =
    badges.map(b=>`<span class="badge">${b}</span>`).join("");
}
loadBadges();

/* CHAT */
function toggleChat(){
    let c = document.getElementById("chat");
    c.style.display = c.style.display==="block"?"none":"block";
}

function chat(e){
    if(e.key==="Enter"){
        let msg = e.target.value;
        let reply = "Hmm 🤔 interesting!";

        if(msg.toLowerCase().includes("hello")) reply="Hey 😄";
        else if(msg.toLowerCase().includes("xp")) reply="You gain XP by using the site 😏";
        else if(msg.toLowerCase().includes("school")) reply="Respect 🔥 keep going!";
        else reply="Keep building your future 💻";

        document.getElementById("log").innerHTML +=
        `<div><b>You:</b> ${msg}</div><div><b>AI:</b> ${reply}</div><hr>`;

        e.target.value="";
    }
}

/* TOAST */
function toast(msg){
    let t = document.createElement("div");
    t.className = "toast";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

/* VISITS */
let visits = Number(localStorage.getItem("visits")) || 0;
visits++;
localStorage.setItem("visits", visits);

/* INIT */
setTimeout(()=>toast("Welcome back 😄"),1000);

</script>

</body>
  </html>
